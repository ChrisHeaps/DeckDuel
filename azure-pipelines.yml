trigger:
  branches:
    include:
      - main
  paths:
    include:
      - DeckDuelReactClient/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - DeckDuelReactClient/*

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'

steps:
- checkout: self

# Setup Node
- task: NodeTool@0
  inputs:
    versionSpec: $(nodeVersion)

# Inject environment variable
- script: |
    echo "VITE_APPBASEURL=$(APPBASEURL)" > DeckDuelReactClient/.env.production
  displayName: 'Inject env variable'

# Verify env
- script: |
    grep "^VITE_APPBASEURL=" DeckDuelReactClient/.env.production || (echo "Missing env" && exit 1)
  displayName: 'Verify env variable'

# Install dependencies
- script: |
    cd DeckDuelReactClient
    npm ci
  displayName: 'Install dependencies'

# Build app
- script: |
    cd DeckDuelReactClient
    npm run build
  displayName: 'Build Vite app'

# Deploy to Azure Static Web Apps
- task: AzureStaticWebApp@0
  inputs:
    app_location: 'DeckDuelReactClient'
    output_location: 'dist'
    azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
