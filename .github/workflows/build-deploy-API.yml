# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Azure Web Service API CI/DC

on:
  push:
    branches:
      - main
    paths:
      - 'DeckDuelAPI/**'      
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Build with dotnet
        run: dotnet build ./DeckDuelAPI/DeckDuelAPI.csproj --configuration Release

      - name: Run EF Core migrations
        run: dotnet ef database update --project ./DeckDuelAPI/DeckDuelAPI.csproj
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION_STRING }}
          
      - name: dotnet publish
        run: dotnet publish ./DeckDuelAPI/DeckDuelAPI.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp    
      
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_04A344C270EE4ACAB3C1B4918DEC9C82 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_AD9AE857DF6B48B69D94781190A6A24A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1A7942EBB011441F8BC70C06AF318CE0 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'DeckDuel'
          slot-name: 'Production'
          package: .
          
